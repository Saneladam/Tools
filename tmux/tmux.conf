# RELOAD
bind r source-file ~/.tmux.conf

# NUMBER CONFIGURATION
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# SUPPORT
set -g mouse on
set -g mode-keys vi
set -g focus-events on
set -g history-limit 50000
set -s escape-time 0

# CUSTOM
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g allow-passthrough on
set -g monitor-activity on

# BAR STATUS
set -g status-interval 5
set -g status-position top
set -g bell-action any
set -g visual-bell on
set -g status-style fg=black,bg=green
set -g status-left "#[fg=black,bg=magenta] < #S > #[fg=black,bold,bg=green] "
set -g status-left-length  40
set -g status-right "#[fg=blue,bold,bg=black]  %H:%M  #[fg=white,bold]%d/%m/%Y #[fg=red] #(cat /sys/class/power_supply/BAT0/capacity)%% "
set -g status-right-length  30

# BINDINGS
# unbind C-b
# set -g prefix C-w
# bind-key C-w send-prefix
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

source-file ~/.config/tmux/theme.tmux
